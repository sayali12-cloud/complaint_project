<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  background-color: #f4d6bc;
  background-image: url('img.jpg');
  background-repeat: no-repeat;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  width: 90%;
  max-width: 600px;
  background-color: rgba(255, 255, 255, 0.9);
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
}

h1 {
  text-align: center;
  color: #333;
  font-size: 28px;
}

label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}

input[type=text], select, textarea {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 5px;
  margin-top: 5px;
  box-sizing: border-box;
  font-size: 14px;
}

textarea {
  resize: none;
}

input[type=submit] {
  width: 100%;
  background-color: #04AA6D;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 15px;
  transition: 0.3s;
}

input[type=submit]:hover {
  background-color: #038e5f;
}

h5 {
  text-align: center;
  margin-top: 10px;
}

h5 a {
  text-decoration: none;
  color: #007bff;
}

h5 a:hover {
  text-decoration: underline;
}

@media (max-width: 600px) {
  .container {
    padding: 15px;
  }

  input[type=text], select, textarea, input[type=submit] {
    font-size: 14px;
  }
}
</style>
</head>
<body>

<div class="container">
  <h1>Complaint Form</h1>
  <form action="complaint.php" method="POST">
    
    <label for="rollno">Roll No</label>
    <input type="text" id="rollno" name="rollno" placeholder="Your Roll No.." required>

    <label for="fname">Full Name</label>
    <input type="text" id="fname" name="fullname" placeholder="Your Full Name.." required>

    <label for="subject">Complaint About</label>
    <select id="subject" name="subject" required>
      <option value="select">Select</option>
      <option value="Hostel">Hostel</option>
      <option value="Library">Library</option>
      <option value="Food">Food</option>
    </select>

    <label for="complaint">Description About Complaint</label>
    <textarea id="complaint" name="complaint" placeholder="Write something.." style="height: 150px" required></textarea>

    <input type="submit" value="Submit">
    
    <h5><a href="home3.html">Go Back to Home</a></h5> 
  </form>
  <script>
   {
        alert("Complaint successfully submitted!");
        return true; // Allows form submission
    }
    </script>
</div>

</body>
</html>
