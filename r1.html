<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
{box-sizing: border-box}
.container {
  padding: 0px;
}

/* Full-width input fields */
input[type=text], input[type=password] {
  width: 100%;
  padding: 10px;
  margin: 8px 0 10px 0;
  display: inline-block;
  border: none;
  background: #f1f1f1;
}

input[type=text]:focus, input[type=password]:focus {
  background-color: #ddd;
  outline: none;
}

hr {
  border: 1px solid #f1f1f1;
  margin-bottom: 20px;
}

/* Set a style for the submit/register button */
.registerbtn {
  background-color: #04AA6D;
  color: white;
  padding: 15px 20px;
  margin: 5px 0;
  border: none;
  cursor: pointer;
  width: 80%;
  opacity: 0.9;
}

.registerbtn:hover {
  opacity:1;
}


a {
  color: dodgerblue;
}

</style>
<body>
    <h1>Registration</h1>

    Enter Full Name<input type="text"="fname"name="fullname" placeholder="Your name..">

    Enter Roll No<input type="text"="rollno"name="rollno" placeholder="Your Roll No..">

    Enter Class <input type="text"="class"name="class" placeholder="Your Class..">

    Enter Division <input type="text"="div"name="div" placeholder="Your Division..">

    Enter Email<input type="text"="email"name="email" placeholder="Your Email..">

    Enter Contact<input type="text"="contact"name="contact" placeholder="Your Contact..">

        Gender  <input type="radio"name="gender" value="Male">Male 
                <input type="radio"name="gender" value="Female"> Female<br>
  
             <button type="submit" class="registerbtn">Register</button>
            
</body>
</html>
