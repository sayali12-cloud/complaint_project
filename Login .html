 <!DOCTYPE html>   
<html>   
<head>  
<meta name="viewport" content="width=device-width, initial-scale=1">  
<title> Login Page </title>  
<style>   
Body {  
  font-family: Calibri, Helvetica, sans-serif;  
  background-color: rgb(244, 214, 188);  
  margin-bottom: 60px;
}  
button {   
       background-color: #a473ef;   
       width: 60%;  
        color: rgb(218, 248, 248);   
        padding: 10px;   
        margin: 10px 0px;   
        border: none;   
        cursor: pointer;   
         }   
   
 input[type=text], input[type=password] {   
        width: 80%;   
        margin: 20px 0;  
        padding:6px 5px;   
        display: inline-block;   
        border: 2px solid rgb(40, 40, 38);   
        box-sizing: border-box;   
    }  
 button:hover {   
        opacity: 0.7;   
    }   
  .cancelbtn {   
        width: auto;   
        padding: 10px 18px;  
        margin: 10px 5px;  
    }   
        
     
 .container {   
     width:40%;
       
        padding: 10px;   
        background-color: rgb(208, 207, 211);  
    }   
</style>   
</head>    
<body>    
    <center> <h1> Login To System </h1> </center>   
    <form> <center>
        <div class="container">   
            <label>Username : </label>   
            <input type="text" placeholder="Enter Username" name="username" required>  <br>
            <label>Password : </label>   
            <input type="password" placeholder="Enter Password" name="password" required><br>  
            <button type="submit">Login</button>  <br>
            <button type="button" class="cancelbtn"> Cancel</button> <br> 
            
            <h4>Not a Member?<a href="#"> Register Here</a></h4> 
            
        </div>
    </center>    
    </form>     
</body>     
</html>
